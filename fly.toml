# EloPhanto Cloud — Fly.io configuration
app = 'elophanto'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  ELOPHANTO_CLOUD = "1"
  ELOPHANTO_CONFIG = "/data/config.yaml"

[http_service]
  internal_port = 18789
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = 'data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 18789
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
