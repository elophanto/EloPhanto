# EloPhanto Cloud — Fly.io configuration
# This is the TEMPLATE config. The provisioning service creates per-user
# machines from the Docker image; this file is used for `fly deploy` to
# push new image versions.

app = "elophanto-cloud"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  ELOPHANTO_CLOUD = "1"
  ELOPHANTO_CONFIG = "/data/config.yaml"

[http_service]
  internal_port = 18789
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# Persistent volume for user data (vault, knowledge, database)
[mounts]
  source = "elophanto_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    port = 18789
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
