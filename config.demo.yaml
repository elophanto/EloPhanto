# EloPhanto — Full demo config
# Copy to config.yaml and fill in your API keys / tokens.

agent:
  name: EloPhanto
  permission_mode: full_auto

llm:
  providers:
    openai:
      api_key: "YOUR_OPENAI_KEY"
      enabled: true
      default_model: "gpt-5.4"
      # base_url: "https://api.openai.com/v1"   # optional — only set for proxies / Azure

    zai:
      api_key: "YOUR_ZAI_KEY"
      enabled: true
      coding_plan: true
      base_url_coding: "https://api.z.ai/api/coding/paas/v4"
      base_url_paygo: "https://api.z.ai/api/paas/v4"
      default_model: "glm-4.7"

    kimi:
      api_key: "YOUR_KILO_API_KEY"   # from app.kilo.ai — Kilo Code Gateway
      enabled: true
      base_url: "https://api.kilo.ai/api/gateway"
      default_model: "kimi-k2.5"     # → moonshotai/kimi-k2.5 on Kilo Gateway

    openrouter:
      api_key: "YOUR_OPENROUTER_KEY"
      enabled: true
      base_url: "https://openrouter.ai/api/v1"

    ollama:
      enabled: true
      base_url: "http://localhost:11434"

  provider_priority:
    - openai
    - kimi
    - zai
    - openrouter
    - ollama

  # Per-task model routing — each task type maps provider → model.
  # The router tries preferred_provider first, then walks provider_priority.
  routing:
    planning:
      preferred_provider: openai
      models:
        openai: "gpt-5.4"                               # latest GPT
        kimi: "kimi-k2.5"                               # multimodal vision + reasoning
        openrouter: "anthropic/claude-sonnet-4.6"        # strongest reasoning
        zai: "glm-5"
        ollama: "qwen2.5:14b"

    coding:
      preferred_provider: openai
      models:
        openai: "gpt-5.4"                               # strong coding
        kimi: "kimi-k2.5"                               # strong coding + vision
        openrouter: "qwen/qwen3.5-plus-02-15"           # strong coding model
        zai: "glm-4.7"
        ollama: "qwen2.5-coder:7b"

    analysis:
      preferred_provider: openai
      models:
        openai: "gpt-5.4"                               # balanced
        kimi: "kimi-k2.5"                               # multimodal analysis
        openrouter: "google/gemini-3.1-pro-preview"      # balanced, good at summarization
        zai: "glm-4.7"
        ollama: "qwen2.5:7b"

    simple:
      preferred_provider: openrouter
      models:
        openrouter: "minimax/minimax-m2.5"               # cheapest for formatting
        kimi: "kimi-k2-thinking-turbo"                   # fast + cheap
        zai: "glm-4.7"
        ollama: "qwen2.5:3b"

  budget:
    daily_limit_usd: 10.0
    per_task_limit_usd: 2.0

shell:
  timeout: 30
  blacklist_patterns:
    - "rm -rf /"
    - "rm -rf /*"
    - "mkfs"
    - "dd if="
    - "> /dev/sda"
    - "chmod -R 777 /"
    - ":(){ :|:& };:"
    - "DROP DATABASE"
    - "TRUNCATE"
  safe_commands:
    - ls
    - cat
    - pwd
    - which
    - echo
    - grep
    - find
    - wc
    - head
    - tail
    - df
    - du
    - ps
    - uname

browser:
  enabled: true
  mode: fresh
  headless: true
  cdp_port: 9222
  cdp_ws_endpoint: ""
  user_data_dir: ""                     # set to your Chrome profile path
  use_system_chrome: true
  viewport_width: 1280
  viewport_height: 720
  profile_directory: ""                 # e.g. "Profile 1"
  vision_model: google/gemini-2.0-flash-001  # OpenRouter model for screenshot analysis

# --- Desktop GUI Agent ---
# Pixel-level desktop control via screenshot + pyautogui.
# mode: local = control this PC directly (pip install pyautogui)
# mode: remote = connect to a VM running OSWorld HTTP server
# See docs/33-OSWORLD.md for VM setup details.
desktop:
  enabled: true
  mode: local                              # local (this PC) | remote (VM)
  vm_ip: ""                                # required for remote mode
  server_port: 5000
  screen_width: 1920
  screen_height: 1080
  observation_type: screenshot           # screenshot | a11y_tree | screenshot_a11y_tree
  max_steps: 15
  sleep_after_action: 1.0

scheduler:
  enabled: true
  max_concurrent_tasks: 1
  default_max_retries: 3
  task_timeout_seconds: 600

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 18789
  auth_token_ref: ""
  max_sessions: 50
  session_timeout_hours: 24

recovery:
  enabled: true
  auto_enter_on_provider_failure: true
  auto_enter_timeout_minutes: 5
  health_check_interval_seconds: 60

hub:
  enabled: true
  index_url: "https://raw.githubusercontent.com/elophanto/elophantohub/main/index.json"
  auto_suggest: true
  cache_ttl_hours: 6

self_dev:
  max_llm_calls: 50
  max_time_seconds: 1800
  max_retries: 3
  test_timeout: 60

goals:
  enabled: true
  max_checkpoints: 20
  max_checkpoint_attempts: 3
  max_goal_attempts: 3
  max_llm_calls_per_goal: 200
  max_time_per_checkpoint_seconds: 600
  context_summary_max_tokens: 1500
  auto_continue: true

knowledge:
  embedding_provider: auto          # auto (OpenRouter if configured, else Ollama), openrouter, ollama
  embedding_openrouter_model: "google/gemini-embedding-001"
  embedding_model: "nomic-embed-text"   # Ollama model
  embedding_fallback: "mxbai-embed-large" # Ollama fallback

plugins:
  plugins_dir: plugins
  auto_load: true

# --- MCP (Model Context Protocol) ---
