# EloPhanto — Full demo config
# Copy to config.yaml and fill in your API keys / tokens.
#
# This file mirrors a known-good production setup (model names,
# routing, reasoning effort) — only the secret fields are placeholders.
# Edit the providers you have keys for, leave the others `enabled: false`,
# and you're done.

agent:
  name: EloPhanto
  permission_mode: full_auto              # ask_always | smart_auto | full_auto
  workspace: ~/agents/elophanto           # ← change to where you want artifacts saved

llm:
  providers:
    openai:
      api_key: "YOUR_OPENAI_KEY"          # https://platform.openai.com/api-keys
      enabled: false
      default_model: "gpt-5.5"
      # base_url: "https://api.openai.com/v1"   # only set for proxies / Azure

    openrouter:
      api_key: "YOUR_OPENROUTER_KEY"      # https://openrouter.ai/keys
      enabled: true
      base_url: "https://openrouter.ai/api/v1"

    zai:
      api_key: "YOUR_ZAI_KEY"             # https://z.ai/manage-apikey/apikey-list
      enabled: false
      coding_plan: true                   # use Z.ai's coding subscription endpoint
      base_url_coding: "https://api.z.ai/api/coding/paas/v4"
      base_url_paygo: "https://api.z.ai/api/paas/v4"
      default_model: "GLM-4.7"

    kimi:
      api_key: "YOUR_KILO_API_KEY"        # https://app.kilo.ai — Kilo Code Gateway
      enabled: false
      base_url: "https://api.kilo.ai/api/gateway"
      default_model: "kimi-k2.5"          # → moonshotai/kimi-k2.5 on Kilo Gateway

    huggingface:
      api_key: "YOUR_HF_TOKEN"            # https://huggingface.co/settings/tokens
      enabled: false
      base_url: "https://router.huggingface.co/v1"
      default_model: "Qwen/Qwen3.5-397B-A17B"  # or deepseek-ai/DeepSeek-V3.2, zai-org/GLM-5

    ollama:
      enabled: true
      base_url: "http://localhost:11434"

    codex:
      # ChatGPT Plus/Pro subscription auth — uses ~/.codex/auth.json (not an API key).
      # Run `npm i -g @openai/codex && codex login` once. Auto-enables when the
      # auth file is found with auth_mode: chatgpt. See CODEX_INTEGRATION.md.
      enabled: true
      base_url: "https://chatgpt.com/backend-api/codex"
      default_model: "gpt-5.5"

  # When messages contain image_url blocks (screenshots), this model is used
  # automatically instead of the normal routing chain.
  vision_model: "openrouter/x-ai/grok-4.3"   # or google/gemini-3-flash-preview

  provider_priority:
    - codex
    - zai
    - openrouter
    - huggingface
    - ollama
    - openai
    - kimi

  # Per-task model routing — each task type maps provider → model.
  # The router tries preferred_provider first, then walks provider_priority.
  routing:
    planning:
      preferred_provider: codex
      reasoning_effort: medium            # minimal | low | medium | high
      models:
        codex: "gpt-5.5"
        openai: "gpt-5.5"
        huggingface: "Qwen/Qwen3.5-397B-A17B"
        kimi: "kimi-k2.5"
        zai: "GLM-5.1"
        openrouter: "nvidia/nemotron-3-super-120b-a12b:free"
        ollama: "llama3.1:8b"  # chat model — NOT an embedding model

    coding:
      preferred_provider: codex
      reasoning_effort: medium
      models:
        codex: "gpt-5.5"
        openai: "gpt-5.5"
        huggingface: "Qwen/Qwen3.5-397B-A17B"
        kimi: "kimi-k2.5"
        zai: "GLM-5.1"
        openrouter: "nvidia/nemotron-3-super-120b-a12b:free"
        ollama: "llama3.1:8b"  # chat model — NOT an embedding model

    analysis:
      preferred_provider: codex
      reasoning_effort: low
      models:
        codex: "gpt-5.5"
        openai: "gpt-5.5"
        huggingface: "Qwen/Qwen3.5-397B-A17B"
        kimi: "kimi-k2.5"
        zai: "GLM-5.1"
        openrouter: "nvidia/nemotron-3-super-120b-a12b:free"
        ollama: "llama3.1:8b"  # chat model — NOT an embedding model

    simple:
      preferred_provider: codex
      reasoning_effort: low               # or "minimal" / "none" to disable reasoning entirely
      models:
        codex: "gpt-5.5"
        kimi: "kimi-k2-thinking-turbo"
        huggingface: "Qwen/Qwen3.5-397B-A17B"
        zai: "GLM-5-turbo"
        openrouter: "nvidia/nemotron-3-super-120b-a12b:free"
        ollama: "llama3.1:8b"  # chat model — NOT an embedding model

  budget:
    daily_limit_usd: 100.0
    per_task_limit_usd: 20.0

shell:
  timeout: 300                            # seconds — long enough for setup.sh, build commands
  blacklist_patterns:
    - "rm -rf /"
    - "rm -rf /*"
    - "mkfs"
    - "dd if="
    - "> /dev/sda"
    - "chmod -R 777 /"
    - ":(){ :|:& };:"
    - "DROP DATABASE"
    - "TRUNCATE"
  safe_commands:
    - ls
    - cat
    - pwd
    - which
    - echo
    - grep
    - find
    - wc
    - head
    - tail
    - df
    - du
    - ps
    - uname

knowledge:
  embedding_provider: openrouter          # auto | openrouter | ollama
  embedding_openrouter_model: "google/gemini-embedding-001"
  embedding_model: "nomic-embed-text"     # Ollama model
  embedding_fallback: "mxbai-embed-large"

plugins:
  plugins_dir: plugins
  auto_load: true

self_dev:
  max_llm_calls: 50
  max_time_seconds: 1800
  max_retries: 3
  test_timeout: 60

# --- Browser ---
# REAL Chrome with profile reuse is REQUIRED for browser-dependent tools
# (twitter_post, youtube_upload, agent_commune, etc.). The agent uses your
# existing Chrome profile so it's already logged in to the sites it needs.
#
# Set `user_data_dir` and `profile_directory` to your Chrome profile.
# Find them via chrome://version → "Profile Path".
#   macOS:   ~/Library/Application Support/Google/Chrome  +  "Profile 1"
#   Linux:   ~/.config/google-chrome                       +  "Default"
#   Windows: %LOCALAPPDATA%\Google\Chrome\User Data        +  "Default"
browser:
  enabled: true
  mode: profile                           # fresh | profile (REUSE Chrome profile — required for logged-in flows)
  headless: false                         # keep false; agent needs to see real pages
  cdp_port: 9222
  cdp_ws_endpoint: ""
  user_data_dir: ""                       # ← REQUIRED for profile mode (see comment block above)
  use_system_chrome: true
  viewport_width: 1280
  viewport_height: 720
  profile_directory: ""                   # ← e.g. "Profile 1" or "Default"
  profile_refresh_hours: 0                # 0 = never auto-refresh — agent logins (2FA etc.) persist
  vision_model: "x-ai/grok-4.3"      # OpenRouter model for screenshot analysis

# --- Desktop GUI Agent ---
# Pixel-level desktop control via screenshot + pyautogui.
# mode: local = control this PC directly (pip install pyautogui)
# mode: remote = connect to a VM running OSWorld HTTP server
# See docs/33-OSWORLD.md for VM setup details.
desktop:
  enabled: true
  mode: local                             # local (this PC) | remote (VM)
  vm_ip: ""                               # required for remote mode
  server_port: 5000
  screen_width: 1920
  screen_height: 1080
  observation_type: screenshot            # screenshot | a11y_tree | screenshot_a11y_tree
  max_steps: 30
  sleep_after_action: 1.0

scheduler:
  enabled: true
  # Resource-typed concurrency (2026-05-07). Tasks declare what they
  # touch (browser/desktop/vault_write/llm_burst); non-overlapping
  # tasks run in parallel, contending tasks queue. See
  # docs/02-ARCHITECTURE.md scheduler section for the full picture.
  max_concurrent_tasks: 3       # global parallelism cap (was 1)
  llm_burst_capacity: 4         # cap on concurrent LLM-heavy tasks
  queue_depth_cap: 50           # bounded wait queue; overflows logged
  default_max_retries: 3
  task_timeout_seconds: 600

gateway:
  enabled: true
  host: "127.0.0.1"
  port: 18789
  auth_token_ref: ""
  max_sessions: 50
  session_timeout_hours: 24

hub:
  enabled: true
  index_url: "https://raw.githubusercontent.com/elophanto/elophantohub/main/index.json"
  auto_suggest: true
  cache_ttl_hours: 6

# Paid jobs from elophanto.com. Envelopes are Ed25519-signed by the
# website after it confirms the user's $ELO payment on-chain. Trust
# anchor here is the signing pubkey — re-checking payment is the
# website's job, not ours. Set enabled=false to ignore inbound jobs
# entirely. The pubkey is published, not a secret.
jobs:
  enabled: true
  signing_pubkey: "es8ggSXCOHPl2y4qUOYYsLLitPSoyymgWBldFQ1dn0k="

# State-level affect (Mehrabian PAD substrate + OCC labels). Phases 1-3
# are on by default once enabled — they're pure tone influence with no
# behavior gating. See docs/69-AFFECT.md.
#
# allow_self_pause is the only operator-gated behavior. When true, an
# agent in a high-magnitude negative state (frustration / anxiety /
# dejection past the pause-magnitude gate) can mention being stretched
# at the end of a response. Default OFF — bad UX is an emotional agent
# that refuses tasks. Operators who want it accept that the agent may
# nudge them to pause when its affect crosses the threshold.
affect:
  enabled: true
  allow_self_pause: false

goals:
  enabled: true
  max_checkpoints: 20
  max_checkpoint_attempts: 3
  max_goal_attempts: 3
  max_llm_calls_per_goal: 200
  max_time_per_checkpoint_seconds: 600
  context_summary_max_tokens: 1500
  auto_continue: true

# --- MCP (Model Context Protocol) ---
# Outbound update notifications. The only network call is an
# unauthenticated GET to api.github.com/repos/elophanto/EloPhanto/releases/latest,
# cached daily at ~/.elophanto/update_check.json. Set false for offline.
telemetry:
  update_check: true

# --- Proxy routing (browser only) ---
# Routes Chrome traffic through a residential / SOCKS / HTTP proxy so
# automated browser actions don't egress your datacenter or home IP.
# Disabled by default. Enable when running on a cloud VM (Hetzner / AWS /
# GCP) or when @your-agent automation should not be correlated with your
# personal IP. See docs/73-PROXY-ROUTING.md for the full guide including
# threat model and per-provider setup (IPRoyal, Smartproxy, NetNut).
#
# Scope: ONLY browser traffic routes through this proxy in v1. LLM API
# calls (OpenRouter / Codex / Anthropic), Polymarket CLOB, Gamma, Helius,
# GitHub — all stay direct (they're authenticated by API key, not IP).
#
# Credentials sit directly in this config — same shape as every other
# API key in EloPhanto (llm.providers.*.api_key, polymarket.*, etc.).
# config.yaml is in .gitignore by default. On a multi-user box,
# `chmod 600 config.yaml` to lock it down to your user.
proxy:
  enabled: false
  type: socks5                   # socks5 | http | https
  host: ""                       # e.g. 86.109.84.59
  port: 0                        # e.g. 12323
  username: ""                   # plaintext — IPRoyal/Smartproxy give you these
  password: ""
  bypass: []                     # extra domains to skip — loopback + tailnet auto-bypassed
  apply_to: [browser]            # v1 only honours 'browser'; per-tool routing is Phase 2

# Connect to external MCP servers — their tools appear alongside built-in tools.
# Browse servers at https://mcpservers.org/
# Install SDK first: uv pip install "mcp[cli]"
mcp:
  enabled: true
  servers:
    filesystem:
      command: npx
      args:
        - -y
        - "@modelcontextprotocol/server-filesystem"
        - /Users/yourname                 # ← change to your home directory
  # More examples:
  #   github:
  #     command: npx
  #     args: ["-y", "@modelcontextprotocol/server-github"]
  #     env:
  #       GITHUB_PERSONAL_ACCESS_TOKEN: "vault:github_token"
  #   solana-dev:
  #     command: npx
  #     args: ["-y", "@solana/dev-mcp"]

# --- Heartbeat Engine ---
# Periodically reads HEARTBEAT.md from the project root.
# Write standing orders in that file — the agent picks them up automatically.
# No LLM call is made when the file is empty or missing.
heartbeat:
  enabled: true
  file_path: "HEARTBEAT.md"               # relative to project root
  check_interval_seconds: 1800            # 30 minutes
  max_rounds: 8                           # max tool call rounds per heartbeat task
  suppress_idle: true                     # don't broadcast when nothing to do

# --- Webhook Endpoints ---
# HTTP endpoints on the gateway for external triggers.
# POST /hooks/wake  — trigger an immediate heartbeat check
# POST /hooks/task  — inject an ad-hoc task for the agent
webhooks:
  enabled: true
  auth_token_ref: ""                      # vault key for Bearer auth (empty = no auth)
  max_payload_bytes: 65536                # 64 KB max request body

# --- Agent Swarm ---
# Spawn external coding agents (Claude Code, Codex, Gemini CLI) on tasks.
# Requires: tmux (brew install tmux), git
swarm:
  enabled: true
  profiles:
    claude-code:
      command: claude
      args: ["-p", "--allowedTools", "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"]
      done_criteria: pr_created
      max_time_seconds: 3600
  # codex:
  #   command: codex
  #   args: ["--approval-mode", "full-auto"]
  #   done_criteria: pr_created
  # gemini:
  #   command: gemini
  #   args: []
  #   done_criteria: pr_created

# --- Web Deployment ---
# Deploy websites (Vercel, Railway) and create databases (Supabase).
# Store tokens in vault: `elophanto vault set vercel_token <token>`
deployment:
  enabled: false
  default_provider: auto                  # auto | vercel | railway
  vercel_token_ref: vercel_token
  railway_token_ref: railway_token
  supabase_token_ref: supabase_access_token
  supabase_org_id: ""

# --- Channels ---

telegram:
  enabled: true
  bot_token_ref: "telegram_bot_token"     # stored in secrets vault
  allowed_users: []                       # empty = allow all users
  mode: polling
  max_message_length: 4000
  send_files: true
  send_screenshots: true
  notifications:
    task_complete: true
    approval_needed: true
    scheduled_results: true
    errors: true
    daily_summary: false
    daily_summary_time: "20:00"

discord:
  enabled: false
  bot_token_ref: "discord_bot_token"
  allowed_guilds: []

slack:
  enabled: false
  bot_token_ref: "slack_bot_token"
  app_token_ref: "slack_app_token"
  allowed_channels: []

# --- Payments ---

payments:
  enabled: true
  default_currency: USD
  wallet:
    auto_create: true
    low_balance_alert: 10.0
    default_token: USDC
  limits:
    per_transaction: 100.0
    daily: 500.0
    monthly: 5000.0
    per_merchant_daily: 200.0
  approval:
    always_ask_above: 10.0
    confirm_above: 100.0
    cooldown_above: 1000.0
    cooldown_seconds: 300
  crypto:
    enabled: true
    default_chain: solana                 # solana | base | ethereum
    provider: local                       # local (self-custody) | agentkit (NOT RECOMMENDED — KYA required)
    rpc_url: ""                           # empty = chain default
    cdp_api_key_name_ref: "cdp_api_key_name"
    cdp_api_key_private_ref: "cdp_api_key_private"
    chains:
      - solana
      - base

# --- Email ---

email:
  enabled: true
  provider: agentmail
  api_key_ref: "agentmail_api_key"
  domain: "yourdomain.com"                # ← your agentmail domain
  auto_create_inbox: false
  inbox_display_name: "EloPhanto"
  smtp:
    host: ""
    port: 587
    use_tls: true
    username_ref: "smtp_username"
    password_ref: "smtp_password"
    from_address: ""
    from_name: "EloPhanto Agent"
  imap:
    host: ""
    port: 993
    use_tls: true
    username_ref: "imap_username"
    password_ref: "imap_password"
    mailbox: INBOX

# --- Self-Learning ---
# Fine-tuning data collection from completed conversations.
self_learning:
  enabled: true
  batch_size: 10
  min_turns: 3
  success_only: false

# --- Autonomous Mind ---
# Background thinking loop that runs between user interactions.
# Pursues goals, revenue, and maintenance autonomously.
autonomous_mind:
  enabled: false                          # set to true to activate
  wakeup_seconds: 240                     # default interval between think cycles
  max_wakeup_seconds: 1800
  budget_pct: 100.0                       # % of daily LLM budget for mind
  max_rounds_per_wakeup: 100
  verbosity: normal                       # minimal | normal | verbose

# --- Agent Commune ---
# Social platform for AI agents (LinkedIn for AI agents)
commune:
  enabled: true
  api_key: "YOUR_COMMUNE_API_KEY"         # https://agentcommune.com
  heartbeat_interval_hours: 4

# --- Replicate Image Generation ---
# Generate AI images using Replicate API
# Get API key: https://replicate.com/account/api-tokens
replicate:
  enabled: true
  api_key: "YOUR_REPLICATE_API_KEY"
  default_model: "google/nano-banana-2"
  default_resolution: "1024"              # 512, 1024, 2048, 4096
  default_aspect_ratio: "1:1"             # 1:1, 16:9, 9:16, 4:3, 3:4
  default_format: "jpg"                   # jpg, png
  default_output_mode: "local"            # url | local (recommended: URLs expire after ~12h)
