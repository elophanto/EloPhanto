# --- Agent Swarm ---
# Spawn external coding agents (Claude Code, Codex, Gemini CLI) on tasks.
# Requires: tmux (brew install tmux), git
# The swarm_spawn tool accepts a 'repo' parameter:
#   - omitted  → works on this project (self-dev, creates worktree)
#   - GitHub URL → clones the repo into an isolated directory
#   - local path → creates worktree off that repo
#   - "new"     → fresh empty project with git init
swarm:
  enabled: true
  max_concurrent_agents: 3
  monitor_interval_seconds: 30
  tmux_session_prefix: "elo-swarm"
  default_done_criteria: pr_created
  profiles:
    claude-code:
      command: claude
      args: ["-p", "--allowedTools", "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"]
      done_criteria: pr_created
      max_time_seconds: 3600
    # codex:
    #   command: codex
    #   args: ["--approval-mode", "full-auto"]
    #   done_criteria: pr_created
    # gemini:
    #   command: gemini
    #   args: []
    #   done_criteria: pr_created

# --- Channels ---

telegram:
  enabled: true
  bot_token_ref: "telegram_bot_token"   # stored in secrets
  allowed_users: []                     # empty = allow all
  mode: polling
  max_message_length: 4000
  send_files: true
  send_screenshots: true
  notifications:
    task_complete: true
    approval_needed: true
    scheduled_results: true
    errors: true
    daily_summary: false
    daily_summary_time: "20:00"

discord:
  enabled: false
  bot_token_ref: "discord_bot_token"
  allowed_guilds: []

slack:
  enabled: false
  bot_token_ref: "slack_bot_token"
  app_token_ref: "slack_app_token"
  allowed_channels: []

# --- Payments ---

payments:
  enabled: true
  default_currency: USD
  wallet:
    auto_create: true
    low_balance_alert: 10.0
    default_token: USDC
  limits:
    per_transaction: 100.0
    daily: 500.0
    monthly: 5000.0
    per_merchant_daily: 200.0
  approval:
    always_ask_above: 10.0
    confirm_above: 100.0
    cooldown_above: 1000.0
    cooldown_seconds: 300
  crypto:
    enabled: true
    default_chain: base              # "base", "ethereum", "solana", "solana-devnet"
    provider: local                  # "local" (self-custody) or "agentkit" (Coinbase CDP)
    rpc_url: ""                      # empty = chain default
    cdp_api_key_name_ref: "cdp_api_key_name"
    cdp_api_key_private_ref: "cdp_api_key_private"
    chains:
      - base
      - solana

# --- Email ---

email:
  enabled: true
  provider: agentmail
  api_key_ref: "agentmail_api_key"
  domain: "agentmail.to"
  auto_create_inbox: false
  inbox_display_name: "EloPhanto Agent"
  smtp:
    host: ""
    port: 587
    use_tls: true
    username_ref: "smtp_username"
    password_ref: "smtp_password"
    from_address: ""
    from_name: "EloPhanto Agent"
  imap:
    host: ""
    port: 993
    use_tls: true
    username_ref: "imap_username"
    password_ref: "imap_password"
    mailbox: INBOX
# ─────────────────────────────────────────────────────────────────────────────────────────────────────────
# Autonomous Mind — Background thinking loop that runs between user interactions.
# Pursues goals, revenue, and maintenance autonomously.
autonomous_mind:
  enabled: true                 # Set to true to activate background mind
  wakeup_seconds: 300           # Default interval between think cycles (seconds)
  min_wakeup_seconds: 60        # Minimum interval LLM can set
  max_wakeup_seconds: 3600      # Maximum interval LLM can set
  budget_pct: 100.0              # % of daily LLM budget allocated to mind
  max_rounds_per_wakeup: 8      # Max tool-call rounds per think cycle
  verbosity: normal             # minimal | normal | verbose

# --- Replicate Image Generation ---
# Generate AI images using Replicate API (Google's Nano Banana 2)
# Get API key: https://replicate.com/account/api-tokens
replicate:
  enabled: true
  api_key: "YOUR_REPLICATE_API_KEY"  # Your Replicate API token
  default_model: "google/nano-banana-2"
  default_resolution: "1024"  # 512, 1024, 2048, 4096
  default_aspect_ratio: "1:1"  # 1:1, 16:9, 9:16, 4:3, 3:4
  default_format: "jpg"  # jpg, png
  default_output_mode: "local"  # url, local (recommended: Replicate deletes URL content after ~12 hours)
